<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LawnLaser Pro - ILS Edition</title>
    <style>
        body { margin: 0; background: #000; color: #39FF14; font-family: monospace; overflow: hidden; touch-action: none; }
        
        /* AVIATION HUD CONTAINER */
        #ils-container { position: absolute; top: 0; width: 100%; height: 50vh; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 2px solid #222; }
        
        /* THE CDI SCALE (DOTS) */
        #cdi-scale { width: 85%; height: 4px; background: #333; position: relative; display: flex; justify-content: space-between; align-items: center; }
        .dot { width: 6px; height: 6px; background: #666; border-radius: 50%; }
        .dot.center { width: 12px; height: 12px; background: transparent; border: 2px solid #39FF14; border-radius: 50%; z-index: 2; }

        /* THE MOVING NEEDLE (LOCALIZER) */
        #needle { position: absolute; width: 6px; height: 140px; background: #39FF14; left: 50%; transform: translateX(-50%); transition: left 0.1s linear; box-shadow: 0 0 15px #39FF14; z-index: 5; }
        
        #heading-bug { font-size: 24px; margin-bottom: 60px; color: #fff; }
        #status-text { font-size: 22px; font-weight: bold; margin-top: 60px; text-transform: uppercase; letter-spacing: 2px; }

        /* BUTTONS & LOGS */
        #btn-container { position: absolute; bottom: 80px; width: 100%; text-align: center; z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .btn { padding: 22px; font-size: 18px; font-weight: bold; border-radius: 10px; border: none; width: 85%; cursor: pointer; text-transform: uppercase; }
        #mainBtn { background: #39FF14; color: #000; }
        #nextBtn { background: #ffcc00; color: #000; display: none; }
        
        #stats { font-size: 12px; color: #666; position: absolute; bottom: 65px; width: 100%; text-align: center; }
        #debug-log { position: absolute; bottom: 0; width: 100%; height: 60px; background: #111; font-size: 10px; color: #444; overflow-y: scroll; padding: 5px; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="ils-container">
        <div id="heading-bug">▼</div>
        
        <div id="cdi-scale">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot center"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            
            <div id="needle"></div>
        </div>

        <div id="status-text">OFFLINE</div>
    </div>

    <div id="btn-container">
        <button class="btn" id="mainBtn">Start Sensors</button>
        <button class="btn" id="nextBtn">Next Row (180° Flip)</button>
    </div>
    
    <div id="stats">HEADING: --° | DRIFT: --°</div>
    <div id="debug-log">System Log: Ready. Ensure phone is flat.</div>

    <script>
        let appState = "READY"; 
        let initialHeading = null;
        let smoothedHeading = 0;
        const alpha = 0.15; // Jitter smoothing

        const log = (msg) => { document.getElementById('debug-log').innerText += "\n> " + msg; };
        const needle = document.getElementById('needle');
        const statusText = document.getElementById('status-text');
        const mainBtn = document.getElementById('mainBtn');
        const nextBtn = document.getElementById('nextBtn');
        const stats = document.getElementById('stats');

        function handleOrientation(e) {
            // Android Chrome Compass Handling
            let heading = e.alpha; 
            if (e.absolute === false) { /* Optional: Handle non-absolute */ }

            smoothedHeading = (alpha * heading) + (1.0 - alpha) * smoothedHeading;

            if (appState === "LOCKED") {
                let diff = smoothedHeading - initialHeading;
                
                // Compass wrap correction
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;

                // ILS Logic: Move needle TOWARD the drift so you "Fly to the Needle"
                // 50% is center. 4% per degree of drift.
                let needlePos = 50 + (diff * 4); 
                needlePos = Math.max(10, Math.min(90, needlePos));
                needle.style.left = needlePos + "%";

                if (Math.abs(diff) > 2.0) {
                    // Correcting directions: If drifting right (positive diff), steer LEFT.
                    let direction = (diff > 0) ? "LEFT" : "RIGHT";
                    statusText.innerText = "STEER " + direction;
                    
                    if (Math.abs(diff) > 5) {
                        statusText.style.color = "red";
                        needle.style.background = "red";
                        if (navigator.vibrate) navigator.vibrate(100);
                    } else {
                        statusText.style.color = "yellow";
                        needle.style.background = "yellow";
                    }
                } else {
                    statusText.innerText = "ON COURSE";
                    statusText.style.color = "#39FF14";
                    needle.style.background = "#39FF14";
                }
                stats.innerText = `HEADING: ${Math.round(smoothedHeading)}° | DRIFT: ${diff.toFixed(1)}°`;
            } else {
                statusText.innerText = "SENSING: " + Math.round(smoothedHeading) + "°";
            }
        }

        mainBtn.addEventListener('click', async () => {
            log("User action: Start sequence...");

            if (appState === "READY") {
                // Initial Sensor Wakeup
                if ('ondeviceorientationabsolute' in window) {
                    window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                    log("Absolute Sensors Online.");
                } else {
                    window.addEventListener('deviceorientation', handleOrientation, true);
                    log("Standard Sensors Online.");
                }
                
                appState = "MAPPING";
                mainBtn.innerText = "Set Start Point";
                statusText.innerText = "Align Mower & Click";
            } 
            else if (appState === "MAPPING") {
                // Mark the start of the first row
                appState = "WALKING";
                initialHeading = smoothedHeading;
                mainBtn.innerText = "Finish First Line";
                mainBtn.style.background = "#ff3333";
                statusText.innerText = "Walk the Line...";
                log("Path Start Locked at " + Math.round(initialHeading) + "°");
            }
            else if (appState === "WALKING") {
                // Calibrate the path and lock the ILS
                appState = "LOCKED";
                initialHeading = smoothedHeading; 
                mainBtn.innerText = "Reset System";
                mainBtn.style.background = "#444";
                mainBtn.style.color = "#fff";
                nextBtn.style.display = "block";
                statusText.innerText = "ILS CAPTURED";
                log("ILS Calibration Complete.");

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LawnLaser - Lightbar HUD</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* THE LIGHTBAR GRID */
        #lightbar { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 10px; 
            width: 95%; 
            height: 120px; 
            margin: 20px auto;
        }
        .segment { 
            background: #1a1a1a; 
            border-radius: 8px; 
            transition: background 0.1s; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: rgba(255,255,255,0.1);
        }
        
        /* INDICATOR COLORS */
        .on-green { background: #39FF14 !important; box-shadow: 0 0 25px #39FF14; color: #000 !important; }
        .on-yellow { background: #ffcc00 !important; box-shadow: 0 0 15px #ffcc00; color: #000 !important; }
        .on-red { background: #ff3333 !important; box-shadow: 0 0 15px #ff3333; color: #000 !important; }

        #status-area { text-align: center; margin-top: 10px; }
        #instruction { font-size: 32px; font-weight: bold; text-transform: uppercase; margin: 10px 0; }
        
        #btn-container { position: absolute; bottom: 80px; width: 100%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn { padding: 25px; font-size: 20px; font-weight: bold; border-radius: 12px; border: none; width: 90%; cursor: pointer; }
        #mainBtn { background: #39FF14; color: #000; }
        #nextBtn { background: #444; color: #fff; display: none; }
        
        #debug { position: absolute; bottom: 0; width: 100%; height: 50px; background: #111; font-size: 10px; color: #444; padding: 5px; }
    </style>
</head>
<body>

    <div id="status-area">
        <div id="instruction">WAITING</div>
        <div id="lightbar">
            <div class="segment" id="seg-3L">L3</div>
            <div class="segment" id="seg-2L">L2</div>
            <div class="segment" id="seg-1L">L1</div>
            <div class="segment center" id="seg-C">OK</div>
            <div class="segment" id="seg-1R">R1</div>
            <div class="segment" id="seg-2R">R2</div>
            <div class="segment" id="seg-3R">R3</div>
        </div>
    </div>

    <div id="btn-container">
        <button class="btn" id="mainBtn">1. START SENSORS</button>
        <button class="btn" id="nextBtn">NEXT ROW (FLIP)</button>
    </div>

    <div id="debug">System Ready.</div>

    <script>
        let appState = "READY"; 
        let initialHeading = null;
        let smoothedHeading = 0;
        const alpha = 0.15; 

        const segments = {
            'L3': document.getElementById('seg-3L'), 'L2': document.getElementById('seg-2L'), 'L1': document.getElementById('seg-1L'),
            'C': document.getElementById('seg-C'),
            'R1': document.getElementById('seg-1R'), 'R2': document.getElementById('seg-2R'), 'R3': document.getElementById('seg-3R')
        };
        const instruction = document.getElementById('instruction');
        const mainBtn = document.getElementById('mainBtn');
        const nextBtn = document.getElementById('nextBtn');

        function clearLightbar() {
            Object.values(segments).forEach(s => s.className = 'segment');
        }

        function handleOrientation(e) {
            let heading = e.alpha || e.webkitCompassHeading; 
            smoothedHeading = (alpha * heading) + (1.0 - alpha) * smoothedHeading;

            if (appState === "LOCKED") {
                let diff = smoothedHeading - initialHeading;
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;

                clearLightbar();

                // LIGHTBAR LOGIC (Fly to the light)
                // If diff is POSITIVE (drift right), lights fill on the LEFT (to pull you back)
                if (Math.abs(diff) <= 2) {
                    segments['C'].classList.add('on-green');
                    instruction.innerText = "ON COURSE";
                    instruction.style.color = "#39FF14";
                } 
                else if (diff > 2 && diff <= 5) { segments['L1'].classList.add('on-yellow'); instruction.innerText = "STEER LEFT"; instruction.style.color = "#ffcc00"; }
                else if (diff > 5 && diff <= 10) { segments['L2'].classList.add('on-yellow'); instruction.innerText = "STEER LEFT"; }
                else if (diff > 10) { segments['L3'].classList.add('on-red'); instruction.innerText = "HARD LEFT"; instruction.style.color = "#ff3333"; }
                
                else if (diff < -2 && diff >= -5) { segments['R1'].classList.add('on-yellow'); instruction.innerText = "STEER RIGHT"; instruction.style.color = "#ffcc00"; }
                else if (diff < -5 && diff >= -10) { segments['R2'].classList.add('on-yellow'); instruction.innerText = "STEER RIGHT"; }
                else if (diff < -10) { segments['R3'].classList.add('on-red'); instruction.innerText = "HARD RIGHT"; instruction.style.color = "#ff3333"; }
            } else {
                instruction.innerText = Math.round(smoothedHeading) + "°";
            }
        }

        mainBtn.addEventListener('click', () => {
            if (appState === "READY") {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                appState = "MAPPING";
                mainBtn.innerText = "2. SET START POINT";
            } 
            else if (appState === "MAPPING") {
                appState = "WALKING";
                initialHeading = smoothedHeading;
                mainBtn.innerText = "3. FINISH FIRST LINE";
                mainBtn.style.background = "#ff3333";
            }
            else if (appState === "WALKING") {
                appState = "LOCKED";
                initialHeading = smoothedHeading; 
                mainBtn.innerText = "RESET SYSTEM";
                mainBtn.style.background = "#222";
                mainBtn.style.color = "#fff";
                nextBtn.style.display = "block";
                instruction.innerText = "PATH LOCKED";
            }
            else { location.reload(); }
        });

        nextBtn.addEventListener('click', () => {
            initialHeading = (initialHeading + 180) % 360;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        });
    </script>
</body>
</html>

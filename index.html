<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LawnLaser Pro + Mapping</title>
    <style>
        body { margin: 0; background: #000; color: #39FF14; font-family: monospace; overflow: hidden; touch-action: none; }
        #hud { position: absolute; top: 5%; width: 100%; text-align: center; z-index: 10; }
        #drift-window { width: 90%; height: 50px; border: 3px solid #39FF14; margin: 10px auto; position: relative; background: rgba(0,0,0,0.5); }
        #center-line { position: absolute; left: 50%; width: 2px; height: 100%; background: #39FF14; }
        #mower-pos { position: absolute; left: 50%; width: 15px; height: 30px; background: #fff; top: 10px; transform: translateX(-50%); transition: left 0.1s ease-out; }
        #map-container { width: 100vw; height: 50vh; background: #111; margin-top: 20px; border-top: 1px solid #333; position: relative; }
        canvas { width: 100%; height: 100%; }
        
        #btn-container { position: absolute; bottom: 30px; width: 100%; text-align: center; z-index: 20; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 20px; font-size: 18px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; }
        #lockBtn { background: #39FF14; color: black; width: 60%; }
        #nextRowBtn { background: #ffcc00; color: black; display: none; width: 40%; }
        
        #stats { font-size: 14px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="status">READY</div>
        <div id="drift-window">
            <div id="center-line"></div>
            <div id="mower-pos"></div>
        </div>
        <div id="stats">GPS: WAITING... | DRIFT: 0°</div>
    </div>

    <div id="map-container">
        <canvas id="lawnMap"></canvas>
    </div>

    <div id="btn-container">
        <button class="btn" id="lockBtn">LOCK START PATH</button>
        <button class="btn" id="nextRowBtn">NEXT ROW (FLIP)</button>
    </div>

    <script>
        let initialHeading = null;
        let smoothedHeading = null;
        let points = [];
        const alpha = 0.15; // Jitter filter (Lower = smoother but slower)

        const canvas = document.getElementById('lawnMap');
        const ctx = canvas.getContext('2d');
        const mower = document.getElementById('mower-pos');
        const status = document.getElementById('status');
        const stats = document.getElementById('stats');
        const lockBtn = document.getElementById('lockBtn');
        const nextBtn = document.getElementById('nextRowBtn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight / 2;

        function drawMap(lat, lon) {
            points.push({x: lon, y: lat});
            if (points.length < 2) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#39FF14";
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.beginPath();

            const minX = Math.min(...points.map(p => p.x));
            const maxX = Math.max(...points.map(p => p.x));
            const minY = Math.min(...points.map(p => p.y));
            const maxY = Math.max(...points.map(p => p.y));

            points.forEach((p, i) => {
                const x = ((p.x - minX) / (maxX - minX || 1)) * (canvas.width - 60) + 30;
                const y = ((p.y - minY) / (maxY - minY || 1)) * (canvas.height - 60) + 30;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        function handleOrientation(e) {
            let rawHeading = e.webkitCompassHeading || (360 - e.alpha);
            
            // Apply smoothing filter to handle mower vibration
            if (smoothedHeading === null) smoothedHeading = rawHeading;
            smoothedHeading = (alpha * rawHeading) + (1.0 - alpha) * smoothedHeading;

            if (initialHeading === null) {
                stats.innerText = `HEADING: ${Math.round(smoothedHeading)}° | WAIT FOR LOCK`;
                return;
            }

            let diff = smoothedHeading - initialHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;

            // Update UI Marker (1 degree = 5% screen offset)
            mower.style.left = `${50 + (diff * 5)}%`;
            
            if (Math.abs(diff) > 4) {
                if (navigator.vibrate) navigator.vibrate(150);
                status.innerText = "STEER " + (diff > 0 ? "LEFT" : "RIGHT");
                status.style.color = "red";
                document.body.style.backgroundColor = "#200";
            } else {
                status.innerText = "KEEP STRAIGHT";
                status.style.color = "#39FF14";
                document.body.style.backgroundColor = "#000";
            }
            stats.innerText = `GPS: TRACKING | DRIFT: ${diff.toFixed(1)}°`;
        }

        async function startApp() {
            window.addEventListener('deviceorientationabsolute', handleOrientation, true);

            navigator.geolocation.watchPosition((pos) => {
                drawMap(pos.coords.latitude, pos.coords.longitude);
            }, (err) => console.error(err), { enableHighAccuracy: true });
        }

        // LOCK STARTING LINE
        lockBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            
            // Set the current heading as our "North"
            initialHeading = smoothedHeading;
            
            lockBtn.innerText = "RE-CENTER";
            nextBtn.style.display = "block"; // Show the flip button
            status.innerText = "PATH LOCKED";
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            startApp();
        });

        // FLIP FOR NEXT ROW
        nextBtn.addEventListener('click', () => {
            if (initialHeading !== null) {
                initialHeading = (initialHeading + 180) % 360;
                
                status.innerText = "HEADING FLIPPED";
                status.style.color = "#ffcc00";
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

                // Quick visual flash for confirmation
                document.body.style.backgroundColor = "#440";
                setTimeout(() => document.body.style.backgroundColor = "#000", 300);
            }
        });
    </script>
</body>
</html>

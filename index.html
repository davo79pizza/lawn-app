<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LawnLaser Pro + Mapping</title>
    <style>
        body { margin: 0; background: #000; color: #39FF14; font-family: monospace; overflow: hidden; touch-action: none; }
        #hud { position: absolute; top: 5%; width: 100%; text-align: center; z-index: 10; }
        #drift-window { width: 90%; height: 50px; border: 3px solid #39FF14; margin: 10px auto; position: relative; }
        #center-line { position: absolute; left: 50%; width: 2px; height: 100%; background: #39FF14; }
        #mower-pos { position: absolute; left: 50%; width: 15px; height: 30px; background: #fff; top: 10px; transform: translateX(-50%); }
        #map-container { width: 100vw; height: 50vh; background: #111; margin-top: 20px; border-top: 1px solid #333; position: relative; }
        canvas { width: 100%; height: 100%; }
        .btn-start { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 20px 40px; background: #39FF14; color: black; font-size: 20px; font-weight: bold; border-radius: 10px; border: none; z-index: 20; }
        #stats { font-size: 14px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="status">READY</div>
        <div id="drift-window">
            <div id="center-line"></div>
            <div id="mower-pos"></div>
        </div>
        <div id="stats">GPS: WAITING... | DRIFT: 0°</div>
    </div>

    <div id="map-container">
        <canvas id="lawnMap"></canvas>
    </div>

    <button class="btn-start" id="lockBtn">START CUTTING</button>

    <script>
        let initialHeading = null;
        let points = [];
        const canvas = document.getElementById('lawnMap');
        const ctx = canvas.getContext('2d');
        const mower = document.getElementById('mower-pos');
        const status = document.getElementById('status');
        const stats = document.getElementById('stats');

        // Resize canvas for high-DPI screens
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight / 2;

        function drawMap(lat, lon) {
            points.push({x: lon, y: lat});
            if (points.length < 2) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#39FF14";
            ctx.lineWidth = 10;
            ctx.lineCap = "round";
            ctx.beginPath();

            // Simple scaling: find min/max to fit points on screen
            const minX = Math.min(...points.map(p => p.x));
            const maxX = Math.max(...points.map(p => p.x));
            const minY = Math.min(...points.map(p => p.y));
            const maxY = Math.max(...points.map(p => p.y));

            points.forEach((p, i) => {
                const x = ((p.x - minX) / (maxX - minX || 1)) * (canvas.width - 40) + 20;
                const y = ((p.y - minY) / (maxY - minY || 1)) * (canvas.height - 40) + 20;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        async function startApp() {
            // 1. Compass Logic
            window.addEventListener('deviceorientationabsolute', (e) => {
                let heading = e.webkitCompassHeading || (360 - e.alpha);
                if (initialHeading === null) initialHeading = heading;

                let diff = heading - initialHeading;
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;

                mower.style.left = `${50 + (diff * 5)}%`;
                
                if (Math.abs(diff) > 5) {
                    if (navigator.vibrate) navigator.vibrate(100);
                    status.innerText = "STEER " + (diff > 0 ? "LEFT" : "RIGHT");
                    status.style.color = "red";
                } else {
                    status.innerText = "KEEP STRAIGHT";
                    status.style.color = "#39FF14";
                }
                stats.innerText = `GPS: TRACKING | DRIFT: ${diff.toFixed(1)}°`;
            }, true);

            // 2. GPS Mapping Logic
            navigator.geolocation.watchPosition((pos) => {
                drawMap(pos.coords.latitude, pos.coords.longitude);
            }, (err) => console.error(err), { enableHighAccuracy: true });
        }

        document.getElementById('lockBtn').addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            startApp();
            document.getElementById('lockBtn').style.display = 'none';
        });
    </script>
</body>
</html>
